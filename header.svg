<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="120" fill="#0d1117"/>
  
  <!-- Scanning line animation -->
  <rect x="0" y="0" width="800" height="2" fill="#00ff41" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,120" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Glitch effect rects -->
  <rect x="0" y="35" width="800" height="3" fill="#00ff41" opacity="0.05">
    <animate attributeName="opacity" values="0.05;0.15;0.05;0;0.05" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="35;33;37;35" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- THAVASIX text -->
  <text x="400" y="65" font-family="Courier New, monospace" font-size="52" font-weight="bold" fill="#00ff41" text-anchor="middle" letter-spacing="12">
    THAVASIX
    <animate attributeName="opacity" values="1;0.8;1;0.95;1" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch copy 1 -->
  <text x="403" y="65" font-family="Courier New, monospace" font-size="52" font-weight="bold" fill="#ff0044" text-anchor="middle" letter-spacing="12" opacity="0">
    THAVASIX
    <animate attributeName="opacity" values="0;0;0.4;0;0;0;0.2;0;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="403;406;400;403" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Glitch copy 2 -->
  <text x="397" y="65" font-family="Courier New, monospace" font-size="52" font-weight="bold" fill="#00cfff" text-anchor="middle" letter-spacing="12" opacity="0">
    THAVASIX
    <animate attributeName="opacity" values="0;0;0;0.3;0;0;0;0.1;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="397;394;400;397" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Tagline -->
  <text x="400" y="95" font-family="Courier New, monospace" font-size="13" fill="#00ff41" text-anchor="middle" opacity="0">
    &gt; unlearning. relearning. building.
    <animate attributeName="opacity" values="0;0;0;1" dur="2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="3s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- Cursor blink after tagline -->
  <text x="603" y="95" font-family="Courier New, monospace" font-size="13" fill="#00ff41" text-anchor="middle" opacity="0">
    █
    <animate attributeName="opacity" values="0;0;0;1;0;1;0;1" dur="3s" begin="2s" repeatCount="indefinite"/>
  </text>
</svg>
